<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODSOFT Tasks</title>
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #172033;
            background:
                radial-gradient(circle at top left, rgba(15, 102, 208, 0.15), transparent 30rem),
                #eef3f8;
        }

        main {
            width: min(620px, calc(100% - 32px));
            padding: 28px;
            text-align: left;
            background: #ffffff;
            border: 1px solid #d7e0eb;
            border-radius: 8px;
            box-shadow: 0 20px 55px rgba(23, 32, 51, 0.14);
        }

        h1 {
            margin: 0 0 10px;
        }

        p {
            color: #64748b;
            line-height: 1.5;
        }

        .task-list {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        a {
            display: block;
            margin-top: 10px;
            padding: 12px 16px;
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            background: #0f66d0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <main>
        <h1>CODSOFT Tasks</h1>
        <p>Open any task directly from this project dashboard.</p>
        <div class="task-list">
            <a href="Task-1-Chatbot/index.html">Open Task 1: Rule-Based AI Chatbot</a>
            <a href="Task-2/index.html">Open Task 2: Tic-Tac-Toe AI</a>
        </div>
    </main>
</body>
</html>
